# Cross-platform release binaries + Docker image on tag push.
#
# Usage: push a tag like `genesis-v0.1.0` to cut a release. Produces:
#   - genesis/chain/build/agenticd-linux-amd64.tar.gz
#   - genesis/chain/build/agenticd-linux-arm64.tar.gz  (used by Oracle Cloud)
#   - ghcr.io/sumitkoul23/agenticd:<tag>
#
# All artifacts free thanks to GitHub Actions on public repos + GHCR.
name: genesis-release

on:
  push:
    tags: ["genesis-v*"]

permissions:
  contents: write
  packages: write

defaults:
  run:
    working-directory: genesis/chain

jobs:
  build-matrix:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache-dependency-path: genesis/chain/go.sum
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p build
          go build -ldflags "-s -w" -o build/agenticd ./cmd/agenticd
          tar czf "build/agenticd-${GOOS}-${GOARCH}.tar.gz" -C build agenticd
      - uses: actions/upload-artifact@v4
        with:
          name: agenticd-${{ matrix.goos }}-${{ matrix.goarch }}
          path: genesis/chain/build/agenticd-*.tar.gz

  docker:
    name: docker image
    runs-on: ubuntu-latest
    needs: build-matrix
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: genesis/chain
          file: genesis/deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/agenticd:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/agenticd:latest

  release:
    name: publish release
    runs-on: ubuntu-latest
    needs: build-matrix
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/agenticd-*.tar.gz
